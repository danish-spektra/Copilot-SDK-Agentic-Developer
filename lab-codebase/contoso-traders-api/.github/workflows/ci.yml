name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install
      - name: Run storefront tests (Node.js)
        run: npm test
      - name: Run warehouse tests (Python)
        run: python3 -m unittest discover -s warehouse -v
